<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind-Body Recovery Cards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0ede8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }

  h1 { font-size: 1.2rem; color: #6b5b4e; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 20px; font-weight: 600; }

  /* Topic nav */
  .nav { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 780px; margin-bottom: 28px; }
  .nav-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid transparent; background: white; color: #6b5b4e; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .nav-btn:hover { border-color: #c9a98a; }
  .nav-btn.active { background: #c9a98a; color: white; border-color: #c9a98a; }

  /* Card */
  .card { background: white; border-radius: 20px; max-width: 720px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }

  .card-header { padding: 28px 32px 20px; border-bottom: 1px solid #f0ede8; }
  .topic-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; opacity: 0.7; }
  .card-title { font-size: 1.9rem; font-weight: 700; color: #2d2420; }
  .card-subtitle { margin-top: 8px; font-size: 0.95rem; color: #7a6a62; line-height: 1.5; }

  .card-body { padding: 24px 32px 32px; display: flex; flex-direction: column; gap: 20px; }

  /* Sections */
  .section { border-radius: 12px; padding: 18px 20px; }
  .section-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; opacity: 0.6; }
  .section ul { padding-left: 16px; }
  .section li { font-size: 0.9rem; line-height: 1.6; color: #3a2e2a; margin-bottom: 4px; }
  .section p { font-size: 0.9rem; line-height: 1.6; color: #3a2e2a; }

  .sec-concept { background: #fdf6f0; }
  .sec-concept .section-title { color: #b07040; }

  .sec-reframe { background: #f0f7f4; }
  .sec-reframe .section-title { color: #2e7d5e; }
  .reframe-item { background: white; border-left: 3px solid #4caf85; border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; font-size: 0.88rem; line-height: 1.5; color: #2d2420; }
  .reframe-item .old { color: #999; text-decoration: line-through; font-size: 0.82rem; margin-bottom: 2px; }
  .reframe-item .new { color: #2e7d5e; font-weight: 600; }

  .sec-strategy { background: #f4f0f9; }
  .sec-strategy .section-title { color: #6a3ea1; }
  .strategy-chip { display: inline-block; background: #ede8f7; color: #6a3ea1; border-radius: 20px; padding: 4px 12px; font-size: 0.82rem; font-weight: 600; margin: 3px 3px 3px 0; }

  .sec-writing { background: #fff8e6; }
  .sec-writing .section-title { color: #b07800; }
  .prompt { background: white; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.88rem; line-height: 1.5; color: #3a2e2a; border: 1px solid #f0d98a; }
  .prompt::before { content: "✏️  "; }

  /* Nav arrows */
  .card-footer { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; border-top: 1px solid #f0ede8; }
  .arrow-btn { background: none; border: 2px solid #d4c4b8; border-radius: 50%; width: 40px; height: 40px; font-size: 1.1rem; cursor: pointer; color: #6b5b4e; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .arrow-btn:hover { background: #c9a98a; border-color: #c9a98a; color: white; }
  .arrow-btn:disabled { opacity: 0.25; cursor: default; }
  .counter { font-size: 0.85rem; color: #9a8880; font-weight: 600; }

  /* Color accents per topic */
  .accent-0 { border-top: 5px solid #e07b54; }
  .accent-1 { border-top: 5px solid #f0b429; }
  .accent-2 { border-top: 5px solid #4caf85; }
  .accent-3 { border-top: 5px solid #5b8dee; }
  .accent-4 { border-top: 5px solid #e05a7a; }
  .accent-5 { border-top: 5px solid #9b59b6; }
  .accent-6 { border-top: 5px solid #1abc9c; }
  .accent-7 { border-top: 5px solid #e67e22; }
  .accent-8 { border-top: 5px solid #c0392b; }
  .accent-9 { border-top: 5px solid #2980b9; }
  .accent-10 { border-top: 5px solid #27ae60; }
  .accent-11 { border-top: 5px solid #8e44ad; }
  .accent-12 { border-top: 5px solid #d35400; }
  .accent-13 { border-top: 5px solid #16a085; }
</style>
</head>
<body>

<h1>Mind-Body Recovery</h1>
<div class="nav" id="nav"></div>
<div class="card" id="card"></div>

    prompts: [

  {
    title: "Releasing Tension & Body Awareness",
    subtitle: "A relaxed body signals safety to the brain. Awareness of tension — and releasing it — is medicine.",
    concepts: [
      "The brain takes cues from the body: a relaxed body signals 'we are safe.'",
      "Releasing physical tension directly calms the nervous system.",
      "Body awareness is your emotional barometer — sensing what emotions feel like physically.",
      "When you acknowledge, make space, and feel an emotion fully, the body is reassured the message is heard → stress response relaxes.",
      "Everything felt in the body — emotions, sensations, symptoms — is a message."

    reframes: [
      { old: "I can't control my body's reactions.", new: "When I release physical tension, I am sending a direct message of safety to my brain." },

    prompts: [
      "Where in your body do you tend to hold tension? What emotion might live there?",

];

let current = 0;

function colorClass(i) { return `accent-${i % 14}`; }

function render() {
  const t = topics[current];
  // Nav
  document.getElementById('nav').innerHTML = topics.map((tp, i) =>
    `<button class="nav-btn ${i===current?'active':''}" onclick="go(${i})">${tp.title}</button>`
  ).join('');

  // Card
  document.getElementById('card').className = `card ${colorClass(current)}`;
  document.getElementById('card').innerHTML = `
    <div class="card-header">
      <div class="topic-label">Topic ${current+1} of ${topics.length}</div>
      <div class="card-title">${t.title}</div>
      <div class="card-subtitle">${t.subtitle}</div>
    </div>
    <div class="card-body">
      <div class="section sec-concept">
        <div class="section-title">📚 Key Concepts</div>
        <ul>${t.concepts.map(c=>`<li>${c}</li>`).join('')}</ul>
      </div>
      <div class="section sec-reframe">
        <div class="section-title">🔄 Reframes & Helpful Phrases</div>
        ${t.reframes.map(r=>`<div class="reframe-item"><div class="old">${r.old}</div><div class="new">→ ${r.new}</div></div>`).join('')}
      </div>
      <div class="section sec-strategy">
        <div class="section-title">🛠 Practical Strategies</div>
        ${t.strategies.map(s=>`<span class="strategy-chip">${s}</span>`).join('')}
      </div>
      <div class="section sec-writing">
        <div class="section-title">✏️ Reflection Prompts</div>
        ${t.prompts.map(p=>`<div class="prompt">${p}</div>`).join('')}
      </div>
    </div>
    <div class="card-footer">
      <button class="arrow-btn" onclick="go(${current-1})" ${current===0?'disabled':''}>←</button>
      <span class="counter">${current+1} / ${topics.length}</span>
      <button class="arrow-btn" onclick="go(${current+1})" ${current===topics.length-1?'disabled':''}>→</button>
    </div>
  `;
}

function go(i) {
  if (i < 0 || i >= topics.length) return;
  current = i;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
